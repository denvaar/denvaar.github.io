        .gallery-container {
            display: flex;

        .photo-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 50px;
            padding-bottom: 50px;
            box-sizing: border-box;
        }

        .bg-white { background-color: #ffffff; }
        .bg-black { background-color: #000000; }

        .photo-wrapper img {
            display: block;
            height: auto;
            object-fit: contain;
        }

        .wide img {
            width: 100%;
            max-width: 1000px;
        }

        .tall img {
            width: auto;
            max-width: 90%;
            max-height: 90vh;
        }


        @media (max-width: 768px) {
            .photo-wrapper {
                padding-top: 80px;
                padding-bottom: 80px;
            }

            .tall img {
                width: 100%;
                max-width: 95%;
                max-height: none;
            }

            .wide img {
                max-width: 100%;
            }
        }
